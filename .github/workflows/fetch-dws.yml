name: Fetch DWS Hydrology Data

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run DWS scraper
        run: |
          python fetch_dws.py

      - name: Commit and push data files
        run: |
          git config user.name "DWS Hydrology Bot"
          git config user.email "bot@waterresearchobservatory.org"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update DWS hydrology data"
          git push
