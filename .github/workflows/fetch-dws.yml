name: Fetch DWS Hydrology Data

on:
  schedule:
    # Runs twice daily at 06:15 and 18:15 UTC (08:15 and 20:15 SAST)
    - cron: '15 6,18 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 lxml

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run DWS scraper
        run: |
          python fetch_dws.py

      - name: Commit and push data files
        run: |
          git config user.name "DWS Hydrology Bot"
          git config user.email "bot@waterresearchobservatory.org"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update DWS hydrology data"
          git push
